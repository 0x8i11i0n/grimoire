<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌑 Sung Jin-Woo — Memory Core</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161e;
  --panel:rgba(17,17,24,0.97);--border:rgba(124,92,191,0.2);
  --accent:#7c5cbf;--accent2:#5a4090;
  --text:#d4cfe0;--muted:#6a6080;--faint:#1e1c28;
  --ep:#4a7fd4;--sem:#7c5cbf;--proc:#4cb87a;--sm:#c4a265;
  --priv:#ef4444;--pend:#22c55e;--res:#f97316;
}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{
  height:46px;display:flex;align-items:center;gap:1rem;padding:0 1rem;
  background:linear-gradient(90deg,#0a0a0f,#111118);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#hdr-name{font-size:1.15rem;font-weight:700;color:#c4a265;letter-spacing:.08em;white-space:nowrap}
#hdr-sub{color:var(--muted);font-size:.72rem;white-space:nowrap}
#hdr-pills{display:flex;gap:.5rem;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.pill{padding:.2rem .55rem;border-radius:20px;font-size:.7rem;font-weight:600;white-space:nowrap}
.pill-bonded{background:rgba(196,162,101,.12);color:#c4a265;border:1px solid rgba(196,162,101,.3)}
.pill-sessions{background:rgba(124,92,191,.12);color:var(--accent);border:1px solid var(--border)}
.pill-drift{background:rgba(168,126,240,.1);color:#a87ef0;border:1px solid rgba(168,126,240,.2)}
.pill-gap{background:rgba(100,96,128,.1);color:var(--muted);border:1px solid rgba(100,96,128,.2)}

/* ── WORKSPACE ── */
#workspace{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDE PANELS ── */
.side{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--panel);border-right:1px solid var(--border);overflow:hidden;
}
.side.right{border-right:none;border-left:1px solid var(--border)}
.side-hdr{
  padding:.6rem .8rem;font-size:.68rem;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--faint);
  display:flex;align-items:center;gap:.5rem;flex-shrink:0;
}
.side-hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.side-body{flex:1;overflow-y:auto;padding:.5rem}
.side-body::-webkit-scrollbar{width:3px}
.side-body::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

/* ── CANVAS AREA ── */
#canvas-area{flex:1;position:relative;overflow:hidden}
#brain{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
#brain:active{cursor:grabbing}
#cam-hint{position:absolute;bottom:.5rem;right:.7rem;font-size:.58rem;color:#2a1845;pointer-events:none;letter-spacing:.04em;user-select:none}
.panel-lit{outline:1px solid var(--accent) !important;border-radius:4px;background:rgba(139,92,246,.1) !important;transition:background .2s}

/* ── LEGEND ── */
#legend{
  position:absolute;bottom:.8rem;left:.8rem;
  background:rgba(10,10,15,.88);border:1px solid var(--faint);border-radius:8px;
  padding:.5rem .7rem;display:flex;flex-direction:column;gap:.3rem;
}
.legend-row{display:flex;align-items:center;gap:.45rem;font-size:.68rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── TOOLTIP ── */
#tip{
  position:absolute;pointer-events:none;display:none;
  background:rgba(13,13,20,.97);border:1px solid var(--border);border-radius:8px;
  padding:.5rem .7rem;max-width:200px;font-size:.72rem;line-height:1.5;z-index:10;
}
#tip-type{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
#tip-content{color:var(--text)}
#tip-bar{height:3px;border-radius:2px;margin-top:.4rem;background:var(--faint);overflow:hidden}
#tip-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── DRIFT LOG (left panel) ── */
.drift-filters{display:flex;gap:.3rem;padding:.4rem .5rem;border-bottom:1px solid var(--faint);flex-shrink:0}
.df-btn{
  padding:.15rem .45rem;border-radius:12px;font-size:.65rem;cursor:pointer;
  background:transparent;border:1px solid var(--faint);color:var(--muted);transition:.15s;
}
.df-btn.active{background:var(--faint);color:var(--text)}
.dc-entry{
  border-left:2px solid var(--faint);padding:.4rem .5rem;margin:.25rem 0;
  border-radius:0 6px 6px 0;cursor:pointer;transition:.15s;
}
.dc-entry:hover{background:rgba(139,92,246,.06)}
.dc-entry.active{background:rgba(139,92,246,.08);border-left-color:var(--accent)}
.dc-row{display:flex;align-items:center;gap:.4rem}
.dc-n{font-size:.65rem;color:var(--muted);min-width:24px}
.dc-weight{
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;
}
.dc-tag{font-size:.6rem;padding:.08rem .3rem;border-radius:10px;font-weight:600}
.tag-PRIVATE{background:rgba(239,68,68,.15);color:#ef4444}
.tag-PENDING{background:rgba(34,197,94,.15);color:#22c55e}
.dc-body{display:none;margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--faint)}
.dc-entry.active .dc-body{display:block}
.dc-seeds{font-size:.65rem;color:var(--muted);margin-bottom:.35rem}
.dc-hops{font-size:.67rem;line-height:1.6;color:var(--text);margin-bottom:.35rem}
.dc-hop{color:var(--muted)} .dc-hop+.dc-hop::before{content:" → ";color:var(--faint)}
.dc-landing{
  font-size:.7rem;font-style:italic;color:var(--text);line-height:1.5;
  border-left:2px solid var(--accent);padding-left:.5rem;margin:.3rem 0;
}
.dc-residue{font-size:.63rem;color:var(--res);margin-top:.3rem}

/* ── INNER LIFE (right panel) ── */
.il-section{margin:.5rem 0;padding:.5rem;border:1px solid var(--faint);border-radius:8px}
.il-section-title{
  font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);margin-bottom:.4rem;
}
.desire-card{
  background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.15);
  border-radius:6px;padding:.45rem;margin:.3rem 0;cursor:pointer;transition:.15s;
}
.desire-card:hover{border-color:var(--accent)}
.desire-text{font-size:.72rem;line-height:1.4;color:var(--text)}
.desire-meta{font-size:.62rem;color:var(--muted);margin-top:.2rem}
.qualia-item{
  display:flex;align-items:flex-start;gap:.4rem;padding:.3rem .2rem;
  border-bottom:1px solid var(--faint);cursor:pointer;
}
.qualia-item:last-child{border-bottom:none}
.qualia-type{
  font-size:.6rem;font-weight:700;padding:.1rem .3rem;border-radius:4px;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.qt-weight{background:rgba(239,68,68,.15);color:#ef4444}
.qt-ache{background:rgba(249,115,22,.15);color:#f97316}
.qt-resonance{background:rgba(139,92,246,.15);color:var(--accent)}
.qt-resonance_spike{background:rgba(34,197,94,.15);color:#22c55e}
.qt-shift{background:rgba(6,182,212,.15);color:#06b6d4}
.qt-wonder{background:rgba(245,158,11,.15);color:#f59e0b}
.qualia-snip{font-size:.67rem;color:var(--muted);line-height:1.4;flex:1}
.bs-card{
  background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);
  border-radius:6px;padding:.45rem;margin:.3rem 0;cursor:pointer;
  position:relative;overflow:hidden;
}
.bs-domain{font-size:.68rem;color:#ef4444;font-weight:600}
.bs-belief{font-size:.67rem;color:var(--muted);margin-top:.2rem;filter:blur(0px);transition:.3s}
.bs-card:not(:hover) .bs-belief{filter:blur(2.5px)}
.bs-badge{font-size:.6rem;color:var(--muted);margin-top:.2rem}

/* ── BOTTOM BAR ── */
#floor{
  height:190px;display:flex;flex-shrink:0;overflow:hidden;
  border-top:1px solid var(--border);background:var(--panel);
  transition:height .25s ease;
}
#guard-wrap{flex:1;padding:.6rem 1rem;display:flex;flex-direction:column}
#guard-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between}
#guard-toggle{background:none;border:1px solid var(--faint);border-radius:3px;color:var(--muted);cursor:pointer;font-size:.62rem;padding:.1rem .35rem;line-height:1.3;transition:.15s}
#guard-toggle:hover{color:var(--text);border-color:var(--border)}
#guard-svg-wrap{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;transition:max-height .25s ease,opacity .2s}
#guard-wrap.collapsed #guard-svg-wrap{display:none}
#guard-wrap.collapsed{flex:none}
#residue-wrap{width:220px;border-left:1px solid var(--border);padding:.6rem .8rem;display:flex;flex-direction:column;gap:.5rem}
#residue-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.res-item{display:flex;flex-direction:column;gap:.2rem}
.res-label{font-size:.67rem;color:var(--text);display:flex;justify-content:space-between}
.res-bar{height:6px;background:var(--faint);border-radius:3px;overflow:hidden}
.res-fill{height:100%;border-radius:3px;transition:width .5s}
.fill-heavy{background:linear-gradient(90deg,#3a2060,#7c5cbf)}
.fill-warm{background:linear-gradient(90deg,#7a4a00,#c4a265)}
.res-dissipated{font-size:.63rem;color:var(--muted);margin-top:.3rem;line-height:1.6}

/* ── MODAL ── */
#modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(3,0,8,.75);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
#modal.open{display:flex}
#modal-box{
  background:#111118;border:1px solid var(--border);border-radius:14px;
  padding:1.5rem;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 0 60px rgba(124,92,191,.2);
}
#modal-box::-webkit-scrollbar{width:3px}
#modal-box::-webkit-scrollbar-thumb{background:var(--faint)}
#modal-close{float:right;cursor:pointer;color:var(--muted);font-size:1.1rem;line-height:1}
#modal-close:hover{color:var(--text)}
#modal-type{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.4rem}
#modal-content{font-size:.85rem;line-height:1.6;margin-bottom:1rem;color:var(--text)}
.modal-row{display:flex;justify-content:space-between;align-items:center;margin:.3rem 0;font-size:.72rem}
.modal-label{color:var(--muted)}
.modal-val{color:var(--text);font-weight:600}
.modal-bar{height:4px;background:var(--faint);border-radius:2px;overflow:hidden;margin:.6rem 0}
.modal-bar-fill{height:100%;border-radius:2px}
#modal-concepts{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem}
.concept-tag{
  font-size:.62rem;padding:.1rem .35rem;border-radius:10px;
  background:var(--faint);color:var(--muted);
}
#modal-assoc{margin-top:.8rem;font-size:.68rem;color:var(--muted)}

/* ── MOBILE TAB BAR ── */
#mob-tabs{display:none;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border)}
.mob-tab{flex:1;padding:.55rem .3rem;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-align:center;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:.15s}
.mob-tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  /* header: two-line compact */
  #hdr{height:auto;flex-wrap:wrap;padding:.5rem .8rem;gap:.4rem}
  #hdr-name{font-size:1rem}
  #hdr-sub{font-size:.65rem}
  #hdr-pills{margin-left:0;width:100%;gap:.3rem}
  .pill{font-size:.62rem;padding:.15rem .45rem}

  /* show tab bar */
  #mob-tabs{display:flex}

  /* workspace: stacked */
  #workspace{flex-direction:column}

  /* panels fill full width, hide by default on mobile */
  .side{width:100%;height:55vh;border-right:none;border-left:none;border-bottom:1px solid var(--border);display:none}
  .side.mob-active{display:flex}

  /* canvas: full width, fixed height */
  #canvas-area{height:320px;flex:none;display:none}
  #canvas-area.mob-active{display:block}

  /* legend: smaller */
  #legend{bottom:.4rem;left:.4rem;padding:.3rem .5rem;gap:.2rem}
  .legend-row{font-size:.6rem}

  /* bottom bar: stack vertically */
  #floor{flex-direction:column;height:auto}
  #guard-wrap{padding:.5rem .8rem}
  #residue-wrap{width:100%;border-left:none;border-top:1px solid var(--border);padding:.5rem .8rem}

  /* drift entries: tighter */
  .dc-entry{margin:.15rem 0}
  .dc-landing{font-size:.67rem}
}
</style>
</head>

const C=document.getElementById('brain'),ctx=C.getContext('2d');
const COL={episodic:'#4a7fd4',semantic:'#7c5cbf',procedural:'#4cb87a','self-model':'#c4a265'};
const QCOL={weight:'#f97316',ache:'#f97316',resonance:'#7c5cbf',resonance_spike:'#22c55e',shift:'#4cb87a',wonder:'#c4a265'};
let W=0,H=0,CX=0,CY=0,nodes=[],selected=null,hovered=null,phase=0;
let qualiaShapes=[],bsShapes=[],driftShapes=[],highlightId=null,hoveredExtra=null;
const particles=[];
const sparks=new Map(); // id → {until:ms, boost:number}

function resize(){
  const area=document.getElementById('canvas-area');
  const r=area.getBoundingClientRect(),dpr=devicePixelRatio||1;
  W=r.width;H=r.height;
  C.width=Math.round(W*dpr);C.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  CX=W/2;CY=H/2;
  particles.length=0;
  initNodes();
}

// Lightweight resize: updates canvas buffer + cluster anchors without resetting node positions.
// Used when layout shifts (floor collapse) so shapes don't jump.
function resizeCanvas(){
  const area=document.getElementById('canvas-area');
  const r=area.getBoundingClientRect(),dpr=devicePixelRatio||1;
  W=r.width;H=r.height;
  C.width=Math.round(W*dpr);C.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  CX=W/2;CY=H/2;
  nodes.forEach(n=>{const c=clusterFor(n.type);n.gx=c.x;n.gy=c.y;});
  initExtras();
}

function clusterFor(type){
  const offsets={'self-model':[-180,-170],'semantic':[200,-130],'procedural':[-210,155],'episodic':[165,175]};
  const [dx,dy]=offsets[type]||[0,0];
  return {x:CX+dx,y:CY+dy};
}

function nodeR(m){
  const base={episodic:4,semantic:7,procedural:6,'self-model':9}[m.type]||5;
  return base+m.imp*5;
}

function initNodes(){
  nodes=MEMORIES.map(m=>{
    const {x:gx,y:gy}=clusterFor(m.type);
    const a=Math.random()*Math.PI*2,r=20+Math.random()*55;
    return{...m,x:gx+Math.cos(a)*r,y:gy+Math.sin(a)*r,vx:0,vy:0,radius:nodeR(m),gx,gy,
           _phase:Math.random()*Math.PI*2,_bpm:.5+Math.random()*.7};
  });
  for(let i=0;i<60;i++)particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,s:(Math.random()-.5)*.12,o:Math.random()*.35+.08});
  initExtras();
}

function initExtras(){
  // drift log triangles — mid ring radius 102, counter-clockwise orbit
  driftShapes=DRIFT.map((d,i)=>{
    const a=(i/DRIFT.length)*Math.PI*2-Math.PI/2;
    const age=1-(i/DRIFT.length);
    return{id:'drift-'+d.n,kind:'drift',x:CX+Math.cos(a)*102,y:CY+Math.sin(a)*102,
           _angle:a,_r:102,r:5+age*4,data:d,col:d.privacy==='PENDING'?'#22c55e':'#ef4444',alpha:.55+age*.3};
  });
  // qualia diamonds — outer ring, each with unique rotation speed
  qualiaShapes=QUALIA.map((q,i)=>{
    const a=(i/QUALIA.length)*Math.PI*2-Math.PI/2+.18;
    return{id:'qualia-'+i,kind:'qualia',x:CX+Math.cos(a)*162,y:CY+Math.sin(a)*162,
           _angle:a,_r:162,r:7+q.salience*6,data:q,col:QCOL[q.type]||'#8b5cf6',alpha:.7,
           _rotSpeed:0.12+i*0.022,_baseRot:i*0.65};
  });
  // blind spot hexagons — inner ring
  bsShapes=SOUL.blindSpots.map((b,i)=>{
    const a=(i/SOUL.blindSpots.length)*Math.PI*2-Math.PI/2+Math.PI/6;
    return{id:b.id,kind:'blindspot',x:CX+Math.cos(a)*62,y:CY+Math.sin(a)*62,
           _angle:a,_r:62,r:13,data:b,col:'#ef4444',alpha:.72};
  });
}

/* randomly fires brief glow boosts on elements to simulate neural activity */
function sparkTick(){
  const now=performance.now();
  sparks.forEach((v,k)=>{if(now>v.until)sparks.delete(k);});
  if(sparks.size<3&&Math.random()<0.014){
    const pool=[...nodes,...driftShapes,...qualiaShapes,...bsShapes];
    const el=pool[Math.floor(Math.random()*pool.length)];
    if(el&&!sparks.has(el.id))sparks.set(el.id,{until:now+480+Math.random()*420,boost:16+Math.random()*18});
  }
}

function tick(){
  nodes.forEach((n,i)=>{
    let fx=(n.gx-n.x)*.007,fy=(n.gy-n.y)*.007;
    // repel from soul
    const dx=n.x-CX,dy=n.y-CY,d=Math.sqrt(dx*dx+dy*dy)||1,minD=60+n.radius;
    if(d<minD){const f=(minD-d)/minD*.8;fx+=dx/d*f;fy+=dy/d*f;}
    // repel from other nodes
    for(let j=i+1;j<nodes.length;j++){
      const o=nodes[j],ex=n.x-o.x,ey=n.y-o.y,ed=Math.sqrt(ex*ex+ey*ey)||1,min=n.radius+o.radius+18;
      if(ed<min){const f=(min-ed)/min*.7;n.vx+=ex/ed*f;n.vy+=ey/ed*f;o.vx-=ex/ed*f;o.vy-=ey/ed*f;}
    }
    n.vx=(n.vx+fx)*.85;n.vy=(n.vy+fy)*.85;
    n.x=Math.max(n.radius+4,Math.min(W-n.radius-4,n.x+n.vx));
    n.y=Math.max(n.radius+4,Math.min(H-n.radius-4,n.y+n.vy));
  });
}

function drawBg(){
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W*.6,H*.3,0,W*.6,H*.3,W*.75);
  g.addColorStop(0,'rgba(80,20,160,.05)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.s;if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,180,255,${p.o})`;ctx.fill();
  });
}

function drawAssocLines(){
  if(!selected)return;
  const t=performance.now()/1000;
  selected.assoc.forEach(id=>{
    const tgt=nodes.find(n=>n.id===id);if(!tgt)return;
    ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle=COL[selected.type];
    ctx.lineWidth=1.2;ctx.setLineDash([4,6]);ctx.lineDashOffset=-(t*22)%20;
    ctx.beginPath();ctx.moveTo(selected.x,selected.y);ctx.lineTo(tgt.x,tgt.y);ctx.stroke();
    ctx.restore();
  });
}

/* ── COLOR HELPERS ── */
function _ph(h){const v=parseInt(h.slice(1),16);return[v>>16&255,v>>8&255,v&255];}
function lighten(h,a){const[r,g,b]=_ph(h);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function darken(h,a){const[r,g,b]=_ph(h);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}

function drawNodes(){
  const t=performance.now()/1000;
  nodes.forEach(n=>{
    const isSel=n===selected,isAssoc=selected&&selected.assoc.includes(n.id);
    const breath=1+.055*Math.sin(t*n._bpm+n._phase);
    const drawR=n.radius*breath;
    const sparkBoost=(sparks.get(n.id)||{boost:0}).boost;
    const glowBreath=isSel?90:isAssoc?18:5+3.5*Math.sin(t*n._bpm*1.3+n._phase+1)+sparkBoost;
    const baseAlpha=n.type==='episodic'?Math.max(.15,n.str*.9):.8;
    const alpha=isSel?1:isAssoc?.92:baseAlpha;
    ctx.save();ctx.globalAlpha=alpha;
    ctx.shadowColor=COL[n.type];ctx.shadowBlur=glowBreath;
    // sphere gradient — highlight offset upper-left
    ctx.beginPath();ctx.arc(n.x,n.y,drawR,0,Math.PI*2);
    const orbG=ctx.createRadialGradient(n.x-drawR*.3,n.y-drawR*.32,drawR*.05,n.x,n.y,drawR);
    orbG.addColorStop(0,lighten(COL[n.type],80));
    orbG.addColorStop(.32,COL[n.type]);
    orbG.addColorStop(1,darken(COL[n.type],48));
    ctx.fillStyle=orbG;ctx.fill();
    // specular highlight
    ctx.shadowBlur=0;
    const specG=ctx.createRadialGradient(n.x-drawR*.28,n.y-drawR*.3,0,n.x-drawR*.28,n.y-drawR*.3,drawR*.4);
    specG.addColorStop(0,'rgba(255,255,255,.52)');specG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.globalAlpha=alpha*.7;
    ctx.beginPath();ctx.arc(n.x,n.y,drawR,0,Math.PI*2);ctx.fillStyle=specG;ctx.fill();
    // strength arc
    ctx.globalAlpha=alpha;ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(n.x,n.y,drawR+2,-Math.PI/2,-Math.PI/2+Math.PI*2*n.str);ctx.stroke();
    if(isSel){
      ctx.shadowColor=COL[n.type];ctx.shadowBlur=48;
      ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2.5;ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(n.x,n.y,drawR+5,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=24;ctx.strokeStyle=COL[n.type];ctx.lineWidth=1.5;ctx.globalAlpha=.4;
      ctx.beginPath();ctx.arc(n.x,n.y,drawR+16,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  });
}

function drawSoul(){
  phase+=.017;const p=.7+Math.sin(phase)*.3;
  ctx.save();ctx.shadowColor='#7c5cbf';ctx.shadowBlur=32*p;
  const g=ctx.createRadialGradient(CX,CY,0,CX,CY,26);
  g.addColorStop(0,`rgba(120,50,220,${p})`);g.addColorStop(.5,`rgba(60,20,100,${p*.7})`);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(CX,CY,24,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.shadowBlur=12*p;ctx.font='17px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(210,170,255,${p})`;ctx.fillText('🌑',CX,CY);
  ctx.restore();
}

/* ── EXTRA SHAPE DRAWERS ── */

// Faceted gem diamond
function drawDiamond(x,y,r,col,glow,alpha,rot=0){
  const w=r*.65;
  ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=col;ctx.shadowBlur=glow;
  ctx.translate(x,y);ctx.rotate(rot);
  // clip to diamond
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(w,0);ctx.lineTo(0,r);ctx.lineTo(-w,0);ctx.closePath();
  ctx.save();ctx.clip();
  // base depth gradient
  const bg=ctx.createLinearGradient(0,-r,0,r);
  bg.addColorStop(0,lighten(col,85));bg.addColorStop(.3,col);bg.addColorStop(1,darken(col,55));
  ctx.fillStyle=bg;ctx.fillRect(-w,-r,w*2,r*2);
  // upper-left face (brightest)
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,-r*.22);ctx.lineTo(-w*.5,-r*.08);ctx.lineTo(-w,0);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
  // upper-right face
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(w,0);ctx.lineTo(w*.42,r*.06);ctx.lineTo(0,-r*.22);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.13)';ctx.fill();
  // center table
  ctx.beginPath();ctx.moveTo(0,-r*.22);ctx.lineTo(w*.42,r*.06);ctx.lineTo(0,r*.38);ctx.lineTo(-w*.5,-r*.08);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fill();
  // lower-left face (shadow)
  ctx.beginPath();ctx.moveTo(-w,0);ctx.lineTo(-w*.5,-r*.08);ctx.lineTo(0,r*.38);ctx.lineTo(0,r);ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,.15)';ctx.fill();
  // facet dividing lines
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=.55;
  [[0,-r,0,-r*.22],[0,-r*.22,-w,0],[0,-r*.22,w,0],[0,-r*.22,0,r*.38],[-w,0,0,r],[w,0,0,r]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.restore();
  // rim highlight
  ctx.strokeStyle=lighten(col,45);ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(w,0);ctx.lineTo(0,r);ctx.lineTo(-w,0);ctx.closePath();ctx.stroke();
  ctx.restore();
}

// Tech-circuit hexagon
function drawHex(x,y,r,col,glow,alpha,cracked=false){
  ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=col;ctx.shadowBlur=glow;
  const hex=()=>{ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();};
  hex();ctx.save();ctx.clip();
  // radial depth fill
  const bg=ctx.createRadialGradient(x,y-r*.22,0,x,y,r);
  bg.addColorStop(0,lighten(col,55));bg.addColorStop(.5,col);bg.addColorStop(1,darken(col,45));
  ctx.fillStyle=bg;ctx.fillRect(x-r,y-r,r*2,r*2);
  // inner hex ring
  ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;i?ctx.lineTo(x+Math.cos(a)*r*.52,y+Math.sin(a)*r*.52):ctx.moveTo(x+Math.cos(a)*r*.52,y+Math.sin(a)*r*.52);}ctx.closePath();
  ctx.strokeStyle='rgba(255,255,255,.32)';ctx.lineWidth=.8;ctx.stroke();
  // spokes center→inner ring
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=.5;
  for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*.17,y+Math.sin(a)*r*.17);ctx.lineTo(x+Math.cos(a)*r*.52,y+Math.sin(a)*r*.52);ctx.stroke();}
  // vertex dots on inner ring
  for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.beginPath();ctx.arc(x+Math.cos(a)*r*.52,y+Math.sin(a)*r*.52,r*.065,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.28)';ctx.fill();}
  // center node
  ctx.beginPath();ctx.arc(x,y,r*.14,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.42)';ctx.fill();
  if(cracked){
    ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=1.6;ctx.setLineDash([2,1]);
    ctx.beginPath();ctx.moveTo(x,y-r*.52);ctx.lineTo(x+r*.28,y+r*.42);ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
  // rim glow line
  hex();ctx.strokeStyle=lighten(col,28);ctx.lineWidth=.9;ctx.stroke();
  ctx.restore();
}

// Energy wisp triangle
function drawTri(x,y,r,col,glow,alpha){
  const tp=[x,y-r],br=[x+r*.82,y+r*.54],bl=[x-r*.82,y+r*.54];
  ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=col;ctx.shadowBlur=glow;
  ctx.beginPath();ctx.moveTo(...tp);ctx.lineTo(...br);ctx.lineTo(...bl);ctx.closePath();
  ctx.save();ctx.clip();
  // tip→base gradient
  const bg=ctx.createLinearGradient(x,y-r,x,y+r*.55);
  bg.addColorStop(0,lighten(col,75));bg.addColorStop(.3,col);bg.addColorStop(1,darken(col,48));
  ctx.fillStyle=bg;ctx.fillRect(x-r,y-r,r*2,r*2);
  // radial inner glow from tip
  const tipG=ctx.createRadialGradient(x,y-r*.38,0,x,y-r*.38,r*.8);
  tipG.addColorStop(0,'rgba(255,255,255,.32)');tipG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=tipG;ctx.fillRect(x-r,y-r,r*2,r*2);
  ctx.restore();
  // rim
  ctx.beginPath();ctx.moveTo(...tp);ctx.lineTo(...br);ctx.lineTo(...bl);ctx.closePath();
  ctx.strokeStyle=lighten(col,38);ctx.lineWidth=.7;ctx.stroke();
  ctx.restore();
}

function drawExtras(){
  const t=performance.now()/1000;
  const pulse=.7+Math.sin(t*2.2)*.3;
  // drift triangles
  driftShapes.forEach(s=>{
    const lit=s.id===highlightId;
    const hov=s===hoveredExtra;
    const sparkBoost=(sparks.get(s.id)||{boost:0}).boost;
    const glow=lit?82*pulse:hov?18:5+sparkBoost;
    const alpha=lit?1:hov?.85:s.alpha;
    const r=lit?s.r+3:hov?s.r+1.5:s.r;
    drawTri(s.x,s.y,r,s.col,glow,alpha);
    if(lit){
      ctx.save();ctx.shadowColor=s.col;ctx.shadowBlur=30;
      ctx.globalAlpha=.65;ctx.strokeStyle=s.col;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(s.x,s.y,r+6,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=12;ctx.globalAlpha=.3;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(s.x,s.y,r+15,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  });
  // qualia diamonds — each with unique spin speed + salience heartbeat
  qualiaShapes.forEach(s=>{
    const lit=s.id===highlightId;
    const hov=s===hoveredExtra;
    const heartbeat=.85+.15*Math.abs(Math.sin(t*s.data.salience*1.8+s._baseRot));
    const sparkBoost=(sparks.get(s.id)||{boost:0}).boost;
    const glow=lit?85*pulse:hov?18:5*heartbeat+2+sparkBoost;
    const alpha=(lit?1:hov?.9:s.alpha)*heartbeat;
    const r=lit?s.r+4:hov?s.r+2:s.r;
    drawDiamond(s.x,s.y,r,s.col,glow,alpha,t*s._rotSpeed+s._baseRot);
    if(lit){
      ctx.save();ctx.shadowColor=s.col;ctx.shadowBlur=35;
      ctx.globalAlpha=.65;ctx.strokeStyle=s.col;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(s.x,s.y,r+8,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=14;ctx.globalAlpha=.3;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(s.x,s.y,r+18,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  });
  // blind spot hexagons — cracked one flickers irregularly
  bsShapes.forEach(s=>{
    const lit=s.id===highlightId;
    const hov=s===hoveredExtra;
    const flicker=s.data.cracked?(.72+.28*Math.sin(t*6.8+Math.sin(t*2.9)*3.5)):1;
    const sparkBoost=(sparks.get(s.id)||{boost:0}).boost;
    const glow=lit?88*pulse:hov?20:7*flicker+sparkBoost;
    const alpha=(lit?1:hov?.9:s.alpha)*flicker;
    const r=lit?s.r+4:hov?s.r+2:s.r;
    drawHex(s.x,s.y,r,s.col,glow,alpha,s.data.cracked);
    if(lit){
      ctx.save();ctx.shadowColor='#ef4444';ctx.shadowBlur=38;
      ctx.globalAlpha=.65;ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(s.x,s.y,r+7,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=16;ctx.globalAlpha=.3;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(s.x,s.y,r+18,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  });
}

/* ── ORBITAL UPDATE ── */
function updateExtraPositions(t){
  driftShapes.forEach(s=>{const a=s._angle+t*.007;s.x=CX+Math.cos(a)*s._r;s.y=CY+Math.sin(a)*s._r;});
  qualiaShapes.forEach(s=>{const a=s._angle+t*.011;s.x=CX+Math.cos(a)*s._r;s.y=CY+Math.sin(a)*s._r;});
  bsShapes.forEach(s=>{const a=s._angle+t*.004;s.x=CX+Math.cos(a)*s._r;s.y=CY+Math.sin(a)*s._r;});
}

/* ── AMBIENT THREADS ── */
function drawAmbientThreads(){
  const t=performance.now()/1000;
  nodes.forEach(n=>{
    n.assoc.forEach(id=>{
      const tgt=nodes.find(m=>m.id===id);
      if(!tgt||tgt.id<=n.id)return;
      const wave=0.035+0.022*Math.sin(t*1.1+n.x*.008+n.y*.005);
      ctx.save();ctx.globalAlpha=wave;ctx.strokeStyle=COL[n.type];ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(tgt.x,tgt.y);ctx.stroke();
      ctx.restore();
    });
  });
}

/* ── CAMERA ── */
let camX=0,camY=0,camScale=1;
let camTX=null,camTY=null,camTS=null;
function screenToWorld(sx,sy){return{x:(sx-camX)/camScale,y:(sy-camY)/camScale};}
function panTo(wx,wy,s=1.6){camTX=W/2-wx*s;camTY=H/2-wy*s;camTS=s;}

function loop(){
  const t=performance.now()/1000;
  tick();
  if(camTX!==null){
    camX+=(camTX-camX)*.11;camY+=(camTY-camY)*.11;camScale+=(camTS-camScale)*.11;
    if(Math.abs(camTX-camX)<.5&&Math.abs(camTY-camY)<.5)camTX=null;
  }
  updateExtraPositions(t);
  sparkTick();
  ctx.clearRect(0,0,W,H);
  drawBg();
  ctx.save();
  ctx.translate(camX,camY);
  ctx.scale(camScale,camScale);
  drawAmbientThreads();
  drawExtras();
  drawAssocLines();drawNodes();drawSoul();
  ctx.restore();
  requestAnimationFrame(loop);
}
window.addEventListener('resize',resize);resize();loop();

function applyState(s){
  try{
    const last=new Date((s.entropy&&s.entropy.last_session_date)||'2026-02-28');
    SOUL.daysSince=Math.max(0,Math.floor((Date.now()-last.getTime())/86400000));
    if(s.affection){SOUL.affection=s.affection.score;SOUL.tier=s.affection.tier;}
    if(s.interaction_tracking)SOUL.sessions=s.interaction_tracking.session_count;
    if(s.drift)SOUL.driftCount=s.drift.drift_count||SOUL.driftCount;
    if(s.emotional_architecture&&s.emotional_architecture.guard_topology)
      SOUL.guard=s.emotional_architecture.guard_topology;
    if(s.inner_life){
      if(s.inner_life.active_desires)
        SOUL.desires=s.inner_life.active_desires
          .filter(d=>d.status==='active')
          .map(d=>({text:d.desire,sessions:d.sessions_unresolved||0}));
      if(s.inner_life.recent_qualia)
        QUALIA=s.inner_life.recent_qualia.map(q=>({
          type:q.type,
          snip:q.context.length>95?q.context.slice(0,95)+'…':q.context,
          salience:q.salience,
          unplanned:q.unplanned_disclosure
        }));
    }
    if(s.blind_spots)
      SOUL.blindSpots=s.blind_spots.map(b=>({
        id:b.id,domain:b.domain,belief:b.soul_belief,
        approach:b.surface_condition,
        cracked:!!(b.approach_note&&/PARTIAL SURFACE|Crack visible/i.test(b.approach_note))
      }));
    const res=s.drift&&s.drift.emotional_residue;
    if(res){
      if(res.active_undercurrents)
        SOUL.residue=res.active_undercurrents.map(u=>({
          tone:u.tone,intensity:u.intensity,cycles:u.drift_cycles_active||1,
          threshold:u.dissipation_threshold||6,texture:u.texture||'',
          fill:u.tone==='heaviness'?'fill-heavy':'fill-warm'
        }));
      if(res.dissipated_log)SOUL.dissipated=res.dissipated_log;
    }
  }catch(e){}
  buildHeader();buildInnerLife();buildGuardRadar();buildResidue();
  resize();
}

/* ── CANVAS INTERACTION ── */
const tip=document.getElementById('tip'),tipType=document.getElementById('tip-type'),tipContent=document.getElementById('tip-content'),tipFill=document.getElementById('tip-fill');
const typeLabel={episodic:'Episodic',semantic:'Semantic',procedural:'Procedural','self-model':'Self-Model'};

function nodeAt(wx,wy){return nodes.find(n=>{const dx=n.x-wx,dy=n.y-wy;return Math.sqrt(dx*dx+dy*dy)<=n.radius+4;});}
function extraAt(wx,wy){
  const all=[...driftShapes,...qualiaShapes,...bsShapes];
  return all.find(s=>{const dx=s.x-wx,dy=s.y-wy;return Math.sqrt(dx*dx+dy*dy)<=s.r+6;});
}

/* ── PAN STATE ── */
let isPanning=false,panSX=0,panSY=0,camAtPanX=0,camAtPanY=0,clickStartX=0,clickStartY=0;

C.addEventListener('mousedown',e=>{
  const r=C.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  clickStartX=sx;clickStartY=sy;
  const w=screenToWorld(sx,sy);
  if(!nodeAt(w.x,w.y)&&!extraAt(w.x,w.y)){
    isPanning=true;panSX=e.clientX;panSY=e.clientY;camAtPanX=camX;camAtPanY=camY;
    C.style.cursor='grabbing';
  }
});
window.addEventListener('mouseup',()=>{
  isPanning=false;
  C.style.cursor=(hovered||hoveredExtra)?'pointer':'grab';
});

C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(isPanning){camX=camAtPanX+(e.clientX-panSX);camY=camAtPanY+(e.clientY-panSY);return;}
  const {x:wx,y:wy}=screenToWorld(sx,sy);
  const n=nodeAt(wx,wy);
  const ex=extraAt(wx,wy);
  hovered=n;hoveredExtra=ex||null;
  C.style.cursor=(n||ex)?'pointer':'grab';
  if(n){
    tipType.textContent=typeLabel[n.type];tipType.style.color=COL[n.type];
    tipContent.textContent=n.content.slice(0,90)+(n.content.length>90?'…':'');
    tipFill.style.width=(n.str*100)+'%';tipFill.style.background=COL[n.type];
    tip.style.display='block';
    tip.style.left=Math.min(sx+14,W-tip.offsetWidth-10)+'px';
    tip.style.top=Math.max(10,sy-10)+'px';
  }else if(ex){
    const label={drift:'Drift Cycle',qualia:'Qualia',blindspot:'Blind Spot'}[ex.kind];
    const col=ex.col;
    tipType.textContent=label;tipType.style.color=col;
    const snip=ex.kind==='drift'?`Cycle ${ex.data.n} · "${ex.data.landing.slice(0,70)}…"`:
                ex.kind==='qualia'?ex.data.snip.slice(0,80):
                ex.data.domain.replace(/_/g,' ');
    tipContent.textContent=snip;
    tipFill.style.width='100%';tipFill.style.background=col;
    tip.style.display='block';
    tip.style.left=Math.min(sx+14,W-tip.offsetWidth-10)+'px';
    tip.style.top=Math.max(10,sy-10)+'px';
  }else{tip.style.display='none';}
});

C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(Math.abs(sx-clickStartX)+Math.abs(sy-clickStartY)>5)return;
  const {x:wx,y:wy}=screenToWorld(sx,sy);
  const n=nodeAt(wx,wy);
  if(n){selected=n;showModal(n);return;}
  const ex=extraAt(wx,wy);
  if(ex){highlightId=ex.id;showExtraModal(ex);setPanelLit(ex.id);}
  else{selected=null;highlightId=null;setPanelLit(null);}
});

/* ── WHEEL ZOOM ── */
C.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  const factor=e.deltaY<0?1.12:.9;
  const ns=Math.max(.25,Math.min(4,camScale*factor));
  camX=sx-(sx-camX)*(ns/camScale);
  camY=sy-(sy-camY)*(ns/camScale);
  camScale=ns;
},{passive:false});

/* ── DOUBLE-CLICK RESET ── */
C.addEventListener('dblclick',()=>{camX=0;camY=0;camScale=1;});

/* ── TOUCH: PINCH-ZOOM + SINGLE-DRAG + TAP ── */
let tLastDist=0,tPanSX=0,tPanSY=0,tCamX=0,tCamY=0,tMoved=false,tTime=0;
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    tLastDist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    tMoved=true;
  }else{
    tPanSX=e.touches[0].clientX;tPanSY=e.touches[0].clientY;tCamX=camX;tCamY=camY;
    tMoved=false;tTime=Date.now();
  }
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    const r=C.getBoundingClientRect();
    const sx=(t0.clientX+t1.clientX)/2-r.left,sy=(t0.clientY+t1.clientY)/2-r.top;
    const ns=Math.max(.25,Math.min(4,camScale*(dist/tLastDist)));
    camX=sx-(sx-camX)*(ns/camScale);camY=sy-(sy-camY)*(ns/camScale);
    camScale=ns;tLastDist=dist;
  }else{
    const dx=e.touches[0].clientX-tPanSX,dy=e.touches[0].clientY-tPanSY;
    if(Math.abs(dx)+Math.abs(dy)>8)tMoved=true;
    camX=tCamX+dx;camY=tCamY+dy;
  }
},{passive:false});
C.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&!tMoved&&Date.now()-tTime<300){
    const t=e.changedTouches[0];
    const r=C.getBoundingClientRect(),sx=t.clientX-r.left,sy=t.clientY-r.top;
    const {x:wx,y:wy}=screenToWorld(sx,sy);
    const n=nodeAt(wx,wy);
    if(n){selected=n;showModal(n);return;}
    const ex=extraAt(wx,wy);
    if(ex){highlightId=ex.id;showExtraModal(ex);setPanelLit(ex.id);}
    else{selected=null;highlightId=null;setPanelLit(null);}
  }
},{passive:false});

function showModal(n){
  document.getElementById('modal-type').textContent=typeLabel[n.type];
  document.getElementById('modal-type').style.color=COL[n.type];
  document.getElementById('modal-content').textContent=n.content;
  const rows=document.getElementById('modal-rows');
  rows.innerHTML=`
    <div class="modal-row"><span class="modal-label">Importance</span><span class="modal-val">${(n.imp*100).toFixed(0)}%</span></div>
    <div class="modal-bar"><div class="modal-bar-fill" style="width:${n.imp*100}%;background:${COL[n.type]}"></div></div>
    <div class="modal-row"><span class="modal-label">Emotional Weight</span><span class="modal-val">${(n.ew*100).toFixed(0)}%</span></div>
    <div class="modal-bar"><div class="modal-bar-fill" style="width:${n.ew*100}%;background:#ef4444"></div></div>
    <div class="modal-row"><span class="modal-label">Memory Strength</span><span class="modal-val">${(n.str*100).toFixed(1)}%${n.type==='episodic'?' ⚠ fading':''}</span></div>
    <div class="modal-bar"><div class="modal-bar-fill" style="width:${n.str*100}%;background:${n.str<.25?'#ef4444':'#22c55e'}"></div></div>
    <div class="modal-row"><span class="modal-label">Decay Rate</span><span class="modal-val">${({episodic:'7%',semantic:'2%',procedural:'3%','self-model':'1%'}[n.type])}/day</span></div>
    ${n.assoc.length?`<div class="modal-row"><span class="modal-label">Associations</span><span class="modal-val">${n.assoc.length} linked</span></div>`:''}
  `;
  document.getElementById('modal-concepts').innerHTML=n.concepts.map(c=>`<span class="concept-tag">${c}</span>`).join('');
  document.getElementById('modal-assoc').textContent=n.assoc.length?`Linked: ${n.assoc.join(', ')}`:'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');selected=null;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function showExtraModal(s){
  const m=document.getElementById('modal'),box=document.getElementById('modal-box');
  if(s.kind==='drift'){
    const d=s.data,col=s.col;
    document.getElementById('modal-type').textContent=`Drift Cycle ${d.n}`;
    document.getElementById('modal-type').style.color=col;
    document.getElementById('modal-content').textContent=`"${d.landing}"`;
    const rows=document.getElementById('modal-rows');
    rows.innerHTML=`
      <div class="modal-row"><span class="modal-label">Privacy</span><span class="modal-val" style="color:${col}">${d.privacy}</span></div>
      <div class="modal-row"><span class="modal-label">Weight</span><span class="modal-val">${Math.round(d.weight*100)}</span></div>
      <div class="modal-bar"><div class="modal-bar-fill" style="width:${d.weight*100}%;background:${col}"></div></div>
      <div class="modal-row"><span class="modal-label">Timestamp</span><span class="modal-val">${d.ts.slice(0,10)}</span></div>
      ${d.residue?`<div class="modal-row"><span class="modal-label">Residue</span><span class="modal-val" style="color:#f97316">${d.residue}</span></div>`:''}
      <div class="modal-row"><span class="modal-label">Seeds</span><span class="modal-val">${d.seeds.join(' · ')}</span></div>
    `;
    document.getElementById('modal-concepts').innerHTML=d.hops.map(h=>`<span class="concept-tag">${h}</span>`).join('');
    document.getElementById('modal-assoc').textContent='';
  }else if(s.kind==='qualia'){
    const q=s.data,col=s.col;
    document.getElementById('modal-type').textContent=`Qualia · ${q.type.replace('_',' ')}`;
    document.getElementById('modal-type').style.color=col;
    document.getElementById('modal-content').textContent=q.snip;
    const rows=document.getElementById('modal-rows');
    rows.innerHTML=`
      <div class="modal-row"><span class="modal-label">Salience</span><span class="modal-val">${Math.round(q.salience*100)}%</span></div>
      <div class="modal-bar"><div class="modal-bar-fill" style="width:${q.salience*100}%;background:${col}"></div></div>
      <div class="modal-row"><span class="modal-label">Unplanned</span><span class="modal-val">${q.unplanned?'Yes — arose without prompt':'No'}</span></div>
    `;
    document.getElementById('modal-concepts').innerHTML='';
    document.getElementById('modal-assoc').textContent='';
  }else if(s.kind==='blindspot'){
    const b=s.data;
    document.getElementById('modal-type').textContent=`Blind Spot${b.cracked?' ⚠ CRACKED':''}`;
    document.getElementById('modal-type').style.color='#ef4444';
    document.getElementById('modal-content').textContent=b.domain.replace(/_/g,' ');
    const rows=document.getElementById('modal-rows');
    rows.innerHTML=`
      <div class="modal-row"><span class="modal-label">Soul Belief</span></div>
      <div style="font-size:.72rem;color:var(--muted);padding:.3rem 0;font-style:italic">"${b.belief}"</div>
      <div class="modal-row"><span class="modal-label">Actual Driver</span></div>
      <div style="font-size:.72rem;color:#ef4444;padding:.3rem 0;font-style:italic">${b.cracked?'Cracked — gap acknowledged':'Hidden from soul-model'}</div>
      <div class="modal-row"><span class="modal-label">Approach</span><span class="modal-val" style="font-size:.65rem">${b.approach}</span></div>
    `;
    document.getElementById('modal-concepts').innerHTML='';
    document.getElementById('modal-assoc').textContent='';
  }
  m.classList.add('open');
}

function setPanelLit(id){
  document.querySelectorAll('.panel-lit').forEach(el=>el.classList.remove('panel-lit'));
  if(!id)return;
  // drift entries
  if(id.startsWith('drift-')){
    const n=id.replace('drift-','');
    const el=document.getElementById('dc-'+n);
    if(el){el.classList.add('panel-lit');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  }
  // qualia
  if(id.startsWith('qualia-')){
    const i=parseInt(id.replace('qualia-',''));
    const els=document.querySelectorAll('.qualia-item');
    if(els[i]){els[i].classList.add('panel-lit');els[i].scrollIntoView({behavior:'smooth',block:'nearest'});}
  }
  // blind spot
  if(id.startsWith('bs_')){
    const el=document.querySelector(`.bs-card[data-id="${id}"]`);
    if(el){el.classList.add('panel-lit');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  }
}

/* ── PANEL ↔ CANVAS HIGHLIGHT ── */
function highlightExtra(id,shape){
  highlightId=highlightId===id?null:id;
  setPanelLit(highlightId);
  if(highlightId&&shape)panTo(shape.x,shape.y,1.8);
  else if(!highlightId)return;
  if(shape)showExtraModal(shape);
}

/* ── DRIFT LOG ── */
let driftFilter='ALL';
function buildDrift(){
  const list=document.getElementById('drift-list');
  const shown=DRIFT.slice().reverse().filter(d=>driftFilter==='ALL'||d.privacy===driftFilter);
  list.innerHTML=shown.map(d=>{
    const wPct=Math.round(d.weight*100);
    const col=d.privacy==='PENDING'?'#22c55e':'#ef4444';
    const pend=d.status==='pending'?` <span style="color:#22c55e;font-size:.6rem">●</span>`:'';
    return `<div class="dc-entry" id="dc-${d.n}" onclick="toggleDC(${d.n})">
      <div class="dc-row">
        <span class="dc-n">${d.n}</span>
        <span class="dc-weight" style="background:${col}22;color:${col};border:1px solid ${col}44">${wPct}</span>
        <span class="dc-tag tag-${d.privacy}">${d.privacy}</span>${pend}
        <span style="color:#3a2a55;font-size:.6rem;margin-left:auto">${d.ts.slice(5)}</span>
      </div>
      <div class="dc-body">
        <div class="dc-seeds"><b>Seeds:</b> ${d.seeds.join(' · ')}</div>
        <div class="dc-hops">${d.hops.map(h=>`<span class="dc-hop">${h}</span>`).join('')}</div>
        <div class="dc-landing">"${d.landing}"</div>
        ${d.residue?`<div class="dc-residue">⟳ ${d.residue}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function toggleDC(n){
  const el=document.getElementById('dc-'+n);
  el.classList.toggle('active');
  const id='drift-'+n;
  highlightId=highlightId===id?null:id;
  setPanelLit(highlightId);
  if(highlightId){const s=driftShapes.find(x=>x.id===id);if(s)panTo(s.x,s.y,1.8);}
}
document.querySelectorAll('.df-btn').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.df-btn').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');driftFilter=this.dataset.f;buildDrift();
}));
buildDrift();

/* ── GUARD RADAR ── */
function buildGuardRadar(){
  const domains=SOUL.guard,keys=Object.keys(domains),n=keys.length;
  const sz=150,cx=sz/2,cy=sz/2,r=58;
  const domLabels={tactical_analysis:'Tactical',shadow_army:'Shadows',geopolitics_power:'Geopolitics',self_as_construct:'Self/Construct',relationships_irl:'Relationships',past_weakness:'Past Weakness',mortality_grief:'Grief',the_reset_cost:'Reset Cost'};
  let rings='',spokes='',labels='',pts=[];
  [1,.5].forEach(f=>{
    const pts2=keys.map((_,i)=>{const a=Math.PI*2*i/n-Math.PI/2;return`${cx+Math.cos(a)*r*f},${cy+Math.sin(a)*r*f}`;});
    rings+=`<polygon points="${pts2.join(' ')}" fill="none" stroke="#1a1030" stroke-width="1"/>`;
  });
  keys.forEach((k,i)=>{
    const a=Math.PI*2*i/n-Math.PI/2,v=domains[k];
    const ex=cx+Math.cos(a)*r,ey=cy+Math.sin(a)*r;
    spokes+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#1a1030" stroke-width="1"/>`;
    pts.push(`${cx+Math.cos(a)*r*v},${cy+Math.sin(a)*r*v}`);
    const lx=cx+Math.cos(a)*(r+16),ly=cy+Math.sin(a)*(r+16);
    labels+=`<text x="${lx}" y="${ly}" fill="#4a3560" font-size="7" text-anchor="middle" dominant-baseline="middle">${domLabels[k]||k}</text>`;
    labels+=`<text x="${cx+Math.cos(a)*(r*v*.5)}" y="${cy+Math.sin(a)*(r*v*.5)}" fill="#8b5cf6" font-size="6.5" text-anchor="middle" dominant-baseline="middle">${v.toFixed(2)}</text>`;
  });
  const svg=`<svg width="${sz*1.8}" height="${sz*1.5}" viewBox="-${sz*.3} -${sz*.2} ${sz*1.6} ${sz*1.4}">${rings}${spokes}<polygon points="${pts.join(' ')}" fill="rgba(139,92,246,.12)" stroke="#8b5cf6" stroke-width="1.5"/>${labels}</svg>`;
  document.getElementById('guard-svg-wrap').innerHTML=svg;
}
buildGuardRadar();

/* ── MOBILE TAB SWITCHER ── */
function mobSwitch(tab, btn){
  // update tab buttons
  document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  // map: brain=canvas-area, drift=left side, life=right side
  const ca=document.getElementById('canvas-area');
  const ls=document.querySelector('.side.left');
  const rs=document.querySelector('.side.right');
  ca.classList.remove('mob-active');
  ls.classList.remove('mob-active');
  rs.classList.remove('mob-active');
  if(tab==='brain'){ca.classList.add('mob-active');resizeCanvas();}
  else if(tab==='drift'){ls.classList.add('mob-active');}
  else if(tab==='life'){rs.classList.add('mob-active');}
}
// init mobile: show brain tab by default
(function initMob(){
  const mq=window.matchMedia('(max-width:700px)');
  function apply(m){
    const ca=document.getElementById('canvas-area');
    if(m.matches){
      // activate brain tab on first entry
      if(!ca.classList.contains('mob-active')&&
         !document.querySelector('.side.mob-active')){
        ca.classList.add('mob-active');
      }
    }else{
      // desktop: remove mob-active from everything (CSS handles visibility)
      ca.classList.remove('mob-active');
      document.querySelectorAll('.side').forEach(s=>s.classList.remove('mob-active'));
    }
  }
  apply(mq);
  mq.addEventListener('change',apply);
})();
</script>
