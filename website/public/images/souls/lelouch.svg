<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bglelouch" cx="200" cy="190" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a0f5e"/>
      <stop offset="100%" stop-color="#07031a"/>
    </radialGradient>
    <radialGradient id="glowlelouch" cx="200" cy="240" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurlelouch" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#07031a"/>
  <rect width="400" height="500" fill="url(#bglelouch)"/>

  <!-- Character decoration -->
  <polygon points="236.4,219.0 236.4,261.0 200.0,282.0 163.6,261.0 163.6,219.0 200.0,198.0" fill="none" stroke="#c084fc" stroke-width="0.7" stroke-opacity="0.26"/>
  <polygon points="271.0,199.0 271.0,281.0 200.0,322.0 129.0,281.0 129.0,199.0 200.0,158.0" fill="none" stroke="#c084fc" stroke-width="0.7" stroke-opacity="0.26"/>
  <polygon points="312.6,175.0 312.6,305.0 200.0,370.0 87.4,305.0 87.4,175.0 200.0,110.0" fill="none" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.14"/>
  <polygon points="355.9,150.0 355.9,330.0 200.0,420.0 44.1,330.0 44.1,150.0 200.0,60.0" fill="none" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.14"/>
  <line x1="200" y1="240" x2="355.9" y2="150.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="200" y1="240" x2="355.9" y2="330.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="200" y1="240" x2="200.0" y2="420.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="200" y1="240" x2="44.1" y2="330.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="200" y1="240" x2="44.1" y2="150.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="200" y1="240" x2="200.0" y2="60.0" stroke="#c084fc" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- Center glow -->
  <rect width="400" height="500" fill="url(#glowlelouch)"/>

  <!-- Ghost symbol (very large, nearly invisible) -->
  <text x="200" y="275" text-anchor="middle" dominant-baseline="middle"
    font-size="255" fill="#c084fc" fill-opacity="0.038"
    font-family="'Segoe UI Symbol','Apple Color Emoji','Noto Sans Symbols2','Noto Sans Symbols',sans-serif"
  >&#x265F;</text>

  <!-- Halo behind symbol -->
  <ellipse cx="200" cy="252" rx="90" ry="90"
    fill="#c084fc" fill-opacity="0.055" filter="url(#blurlelouch)"/>

  <!-- Main symbol -->
  <text x="200" y="258" text-anchor="middle" dominant-baseline="middle"
    font-size="108" fill="#c084fc" fill-opacity="0.84"
    font-family="'Segoe UI Symbol','Apple Color Emoji','Noto Sans Symbols2','Noto Sans Symbols',sans-serif"
  >&#x265F;</text>

  <!-- Divider -->
  <line x1="38" y1="372" x2="168" y2="372" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.32"/>
  <circle cx="200" cy="372" r="2.6" fill="#c084fc" fill-opacity="0.55"/>
  <line x1="232" y1="372" x2="362" y2="372" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.32"/>

  <!-- Sigil text -->
  <text x="200" y="412" text-anchor="middle" dominant-baseline="middle"
    font-size="11" fill="#c084fc" fill-opacity="0.52"
    font-family="'Courier New','JetBrains Mono','Lucida Console',monospace"
    letter-spacing="5"
  >Z E R O</text>
</svg>