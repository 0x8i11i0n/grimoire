name: Download Soul Portraits

on:
  workflow_dispatch:   # Press "Run workflow" in the Actions tab — that's it

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download character portraits
        run: node scripts/download-soul-portraits.js

      - name: Commit portraits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/images/souls/ registry/index.json
          git diff --staged --quiet && echo "Nothing new to commit." && exit 0
          git commit -m "chore: download character portraits [skip ci]"
          git push
